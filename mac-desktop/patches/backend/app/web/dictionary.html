<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>忆刻 · 词典下载管理</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #2563eb;
      --ok: #16a34a;
      --err: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #0b1220, var(--bg));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { margin: 0 0 16px; color: var(--muted); line-height: 1.6; }
    .bar {
      height: 10px;
      background: rgba(148, 163, 184, 0.2);
      border-radius: 999px;
      overflow: hidden;
      margin: 16px 0 8px;
    }
    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      transition: width 0.25s ease;
    }
    .status { min-height: 1.5em; color: var(--muted); font-size: 0.95rem; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }
    .actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .primary { background: var(--accent); color: white; }
    .secondary { background: rgba(148, 163, 184, 0.15); color: var(--text); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h1>英文词典下载管理</h1>
    <p>
      忆刻使用开源 ECDICT 词典（约 200MB）。批量添加单词、自动补全音标释义等功能需要此词典。
      下载完成后可离线查词。
    </p>
    <div class="bar"><span id="progressBar"></span></div>
    <div id="statusText" class="status">正在检查状态…</div>
    <div class="actions">
      <button id="downloadBtn" class="primary">开始下载</button>
      <button id="backBtn" class="secondary">返回应用</button>
    </div>
  </div>
  <script>
    const progressBar = document.getElementById("progressBar");
    const statusText = document.getElementById("statusText");
    const downloadBtn = document.getElementById("downloadBtn");
    const backBtn = document.getElementById("backBtn");
    let pollTimer = null;

    function setStatus(text, kind) {
      statusText.textContent = text;
      statusText.className = "status" + (kind ? " " + kind : "");
    }

    async function fetchStatus() {
      const res = await fetch("/api/desktop/dictionary/status");
      if (!res.ok) throw new Error("无法获取词典状态");
      return res.json();
    }

    function renderStatus(data) {
      const pct = Math.max(0, Math.min(100, Number(data.progress || 0)));
      progressBar.style.width = pct + "%";

      if (data.ready) {
        setStatus("词典已就绪（" + (data.size_mb || 0) + " MB）", "ok");
        downloadBtn.disabled = true;
        downloadBtn.textContent = "已完成";
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
        return;
      }

      if (data.status === "downloading") {
        setStatus(data.message || "正在下载…");
        downloadBtn.disabled = true;
        downloadBtn.textContent = "下载中…";
        if (!pollTimer) pollTimer = setInterval(refresh, 1200);
        return;
      }

      if (data.status === "error") {
        setStatus(data.error || "下载失败，请重试", "err");
        downloadBtn.disabled = false;
        downloadBtn.textContent = "重新下载";
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
        return;
      }

      setStatus("词典尚未下载，请点击「开始下载」（需联网）");
      downloadBtn.disabled = false;
      downloadBtn.textContent = "开始下载";
    }

    async function refresh() {
      try {
        renderStatus(await fetchStatus());
      } catch (err) {
        setStatus(String(err.message || err), "err");
      }
    }

    downloadBtn.addEventListener("click", async () => {
      downloadBtn.disabled = true;
      downloadBtn.textContent = "准备中…";
      try {
        const res = await fetch("/api/desktop/dictionary/download", { method: "POST" });
        if (!res.ok) throw new Error("无法开始下载");
        renderStatus(await res.json());
        if (!pollTimer) pollTimer = setInterval(refresh, 1200);
      } catch (err) {
        setStatus(String(err.message || err), "err");
        downloadBtn.disabled = false;
        downloadBtn.textContent = "开始下载";
      }
    });

    backBtn.addEventListener("click", () => {
      window.location.href = "/";
    });

    refresh();
  </script>
</body>
</html>
