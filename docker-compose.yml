services:
  backend:
    build: ./backend
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=sqlite:////data/ebbinghaus.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    volumes:
      - db_data:/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "0.0.0.0:10001:80"
    depends_on:
      - backend
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./deploy/nginx-yike.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  db_data:
