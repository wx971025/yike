  #   image: nginx:1.27-alpine
  #   environment:
  #     - TZ=Asia/Shanghai
  #   ports:
  #     - "0.0.0.0:80:80"
  #   volumes:
  #     - ./deploy/nginx-yike.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./releases/desktop:/srv/desktop-releases:ro
  #   depends_on:
  #     - frontend
  #   restart: unless-stopped

volumes:
  db_data:
