services:
  backend:
    build: ./backend
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=sqlite:////data/ebbinghaus.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    volumes:
      - db_data:/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "0.0.0.0:10001:80"
    depends_on:
      - backend
    restart: unless-stopped

  # gateway 网关容器暂停由 compose 管控（my-yike.online 域名未解封）
  # 需要时取消注释即可恢复；此处注释不影响 backend/frontend 部署。
