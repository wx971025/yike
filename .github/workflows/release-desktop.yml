name: Release Windows Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

concurrency:
  group: release-windows-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
        working-directory: windows-desktop

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after Inno Setup install" }
          Write-Host "Inno Setup:" $iscc

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "app_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build YiKe desktop app
        run: ./build.ps1 -AppVersion "${{ steps.meta.outputs.app_version }}"

      - name: Verify installer
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "output\YiKeSetup.exe"
          if (-not (Test-Path $exe)) {
            throw "Installer not found: $exe"
          }
          Write-Host "Installer ready:" (Get-Item $exe).Length "bytes"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: 忆刻 YiKe ${{ steps.meta.outputs.tag }}
          body_path: .github/release-notes/${{ steps.meta.outputs.tag }}.md
          files: windows-desktop/output/YiKeSetup.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
