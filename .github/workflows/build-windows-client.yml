name: Build Windows Client

on:
  workflow_dispatch:
  push:
    paths:
      - "windows-client/**"
      - "backend/**"
    branches:
      - main

jobs:
  build-setup:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: windows-client

    steps:
      - uses: actions/checkout@v4

      - name: Sync backend source
        run: ./sync-source.ps1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            windows-client/YiKe.Backend/requirements-build.txt
            windows-client/YiKe.Backend/workspace/backend/requirements.txt

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download ECDICT dictionary
        run: ./scripts/download-ecdict.ps1

      - name: Build YiKeBackend.exe and YiKe.exe
        run: ./build.ps1 -SkipInstaller

      - name: Build YiKeSetup.exe when Inno Setup is available
        run: |
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($iscc) {
            & $iscc (Join-Path $PWD "installer\yike.iss")
          } else {
            Write-Warning "Inno Setup not installed on runner; skipping YiKeSetup.exe"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: YiKe-windows-client
          path: |
            windows-client/output/stage/YiKe.exe
            windows-client/output/stage/YiKeBackend.exe
            windows-client/output/YiKeSetup.exe
          if-no-files-found: warn
          retention-days: 14
