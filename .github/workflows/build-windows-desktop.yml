name: Build Windows Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: build-windows-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: windows-desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build YiKe desktop app
        run: ./build.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: YiKeSetup
          path: windows-desktop/output/YiKeSetup.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload portable app (onedir)
        uses: actions/upload-artifact@v4
        with:
          name: YiKe-portable
          path: windows-desktop/output/stage/YiKe/**
          if-no-files-found: warn
          retention-days: 14
