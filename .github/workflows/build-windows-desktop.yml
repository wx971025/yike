name: Build Windows Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: build-windows-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: windows-desktop

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Inno Setup 6
        shell: pwsh
        working-directory: windows-desktop
        run: |
          choco install innosetup -y --no-progress
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after Inno Setup install" }
          Write-Host "Inno Setup:" $iscc

      - name: Build YiKe desktop app
        run: ./build.ps1 -AppVersion "${{ steps.meta.outputs.app_version }}"

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: YiKeSetup
          path: windows-desktop/output/YiKeSetup.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload portable app (onedir)
        uses: actions/upload-artifact@v6
        with:
          name: YiKe-portable
          path: windows-desktop/output/stage/YiKe/**
          if-no-files-found: warn
          retention-days: 14
